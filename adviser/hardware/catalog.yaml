# ─────────────────────────────────────────────────────────────────
embed_catalog:

  # all-minilm: 22M params, ~50MB disk
  # Fastest, lowest quality. Good baseline for low-RAM machines.
  - id: "all-minilm"
    params_b: 0.022
    disk_mb: 50
    note: "Fastest option. Good for low-RAM machines."

  # nomic-embed-text: 137M params, ~274MB disk
  # MTEB score 62.39 — matches OpenAI text-embedding-3-small
  # Best default for most users. Long context (8192 tokens).
  - id: "nomic-embed-text"
    params_b: 0.137
    disk_mb: 274
    note: "Recommended default. Matches OpenAI text-embedding-3-small quality."

  # nomic-embed-text-v2-moe: MoE multilingual embedding
  # ~300MB disk. 100+ languages. Matryoshka embeddings supported.
  - id: "nomic-embed-text-v2-moe"
    params_b: 0.137
    disk_mb: 300
    note: "Best for multilingual RAG. MoE architecture."

  # mxbai-embed-large: 335M params, ~670MB disk
  # MTEB score 64.68 — matches OpenAI text-embedding-3-large
  # Best English quality under 1GB.
  - id: "mxbai-embed-large"
    params_b: 0.335
    disk_mb: 670
    note: "Best English quality under 1GB. Matches text-embedding-3-large."

  # bge-m3: 568M params, ~1.2GB disk
  # MTEB multilingual. Supports dense + sparse + ColBERT retrieval.
  # Best for hybrid search (dense + BM25 in one model).
  - id: "bge-m3"
    params_b: 0.568
    disk_mb: 1200
    note: "Best for multilingual + hybrid RAG. Supports dense and sparse retrieval."

  # snowflake-arctic-embed2: 568M params, ~1.1GB disk
  # Multilingual, Matryoshka, strong on retrieval-specific MTEB.
  - id: "snowflake-arctic-embed2"
    params_b: 0.568
    disk_mb: 1100
    note: "Multilingual alternative to bge-m3. Strong retrieval benchmark scores."

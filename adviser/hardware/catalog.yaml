# Adviser Hardware Catalog
# ─────────────────────────────────────────────────────────────────
# Edit this file to add, remove, or update models.
# All LLM ids are Ollama tags. All embed ids are Ollama tags.
#
# LLM fields:
#   id            string   Ollama model tag
#   params_b      float    Total parameters in billions
#   category      string   general | coding | reasoning | multimodal
#   active_params_b       float (MoE only) — active params per token
#   expert_count          int   (MoE only)
#   experts_active_per_token int (MoE only)
#
# Embed fields:
#   id            string   Ollama model tag
#   params_b      float    Total parameters in billions
#   disk_mb       int      Approximate disk size in MB (informational)
#   note          string   Optional human-readable note
#
# Sources: Ollama library, morphllm.com April 2026,
#          promptquorum.com May 2026, localaimaster.com March 2026
# Last updated: May 2026 — check ollama.com/library for newer models
# ─────────────────────────────────────────────────────────────────

